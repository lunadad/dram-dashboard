name: Daily Dashboard Update

on:
  schedule:
    # 09:30 KST = 00:30 UTC, weekdays only
    - cron: '30 0 * * 1-5'
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest market data (Yahoo Chart API)
        run: python scripts/update_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet \
            && echo "No new data — skipping commit" \
            || (git commit -m "chore: update data $(date -u +'%Y-%m-%d %H:%M UTC')" \
                && git push)
